<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Contact Us | Ennar Enterprises</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body {
            background: #f7f7f7;
            font-family: Arial, Helvetica, sans-serif;
        }

        .contact-section {
            padding: 70px 0;
        }

        .contact-card {
            background: #fff;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,.08);
            height: 100%;
        }

        .contact-card h2 {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .contact-card p {
            color: #666;
            margin-bottom: 30px;
        }

        .back-btn {
            margin-bottom: 30px;
        }

        .contact-item {
            display: flex;
            margin-bottom: 25px;
        }

        .contact-icon {
            width: 55px;
            height: 55px;
            background: #ffc107;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 18px;
            flex-shrink: 0;
        }

        .contact-item h5 {
            margin-bottom: 5px;
            font-weight: 600;
        }

        .contact-item a {
            color: #444;
            text-decoration: none;
        }

        .contact-item a:hover {
            color: #ffc107;
        }

        .map-box {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,.08);
            height: 100%;
        }

        .map-box iframe {
            width: 100%;
            height: 100%;
            min-height: 600px;
            border: none;
        }

        @media(max-width:991px){

            .contact-section{
                padding:40px 15px;
            }

            .map-box iframe{
                min-height:400px;
            }

        }

        @media(max-width:576px){

            .contact-card{
                padding:25px;
            }

            .contact-icon{
                width:45px;
                height:45px;
                font-size:18px;
            }

            .map-box iframe{
                min-height:300px;
            }

        }

    </style>

</head>
